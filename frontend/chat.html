<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" type="image/svg+xml">
<title>QuickChat | Room</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { sans: ['Outfit', 'sans-serif'] },
                colors: {
                    primary: '#6d28d9',
                    secondary: '#3b82f6',
                    dark: '#0f172a',
                    darker: '#020617',
                }
            }
        }
    }
</script>
<style>
    /* Chat specific styles */
    .chat-bubble {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 20px;
        position: relative;
        word-break: break-word;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bubble-you {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        color: white;
        border-bottom-right-radius: 4px;
    }
    .bubble-other {
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(255,255,255,0.05);
        color: #e2e8f0;
        border-bottom-left-radius: 4px;
    }
    .bubble-system {
        background: rgba(0,0,0,0.2);
        color: #94a3b8;
        font-size: 0.85rem;
        padding: 6px 12px;
        border-radius: 99px;
        margin: 0 auto;
    }
    @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .msg-time { font-size: 0.7rem; opacity: 0.7; margin-top: 4px; text-align: right; }
    
    /* Background blob animations */
    @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-20px) scale(1.05); }
    }
    .blob { animation: float 10s ease-in-out infinite; }
    .blob-delay { animation-delay: 5s; }
</style>
</head>
<body class="bg-darker text-gray-100 h-screen overflow-hidden flex flex-col font-sans">
    
    <!-- Background Effects -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="blob absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[100px]"></div>
        <div class="blob blob-delay absolute bottom-[10%] -right-[10%] w-[30%] h-[30%] rounded-full bg-secondary/10 blur-[100px]"></div>
    </div>

    <!-- App Container -->
    <div class="relative z-10 flex flex-col h-full w-full max-w-5xl mx-auto shadow-2xl glass-panel md:my-4 md:rounded-2xl md:h-[calc(100vh-2rem)] md:border md:border-white/5">
        
        <!-- Header -->
        <header class="flex items-center justify-between p-4 md:p-5 border-b border-white/10 bg-white/5 backdrop-blur-md shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='index.html'" class="p-2 -ml-2 rounded-lg hover:bg-white/10 transition-colors text-gray-400 hover:text-white" title="Leave Room">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </button>
                <div>
                    <h1 id="chatName" class="font-bold text-lg cursor-pointer hover:text-blue-400 transition-colors flex items-center gap-2" onclick="openNameModal()" title="Edit Name">
                        New Chat
                        <svg class="w-3.5 h-3.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </h1>
                    <div class="text-xs text-gray-400 flex items-center gap-2">
                        Code: <span id="roomDisplay" class="font-mono bg-white/10 px-1.5 py-0.5 rounded text-white tracking-widest"></span>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="hidden md:flex items-center gap-2 text-xs text-gray-400 mr-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/5">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span id="userCount">1</span> online
                </div>
                <button onclick="openInfoModal()" class="p-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-colors text-gray-300" title="Room Info">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
            </div>
        </header>

        <!-- Messages Area -->
        <main id="messagesContainer" class="flex-1 overflow-y-auto p-4 md:p-6 flex flex-col gap-4 scroll-smooth">
            <!-- Messages injected here -->
        </main>

        <!-- Typing Indicator Area -->
        <div id="typingIndicator" class="px-6 py-2 text-xs text-gray-400 italic hidden"></div>

        <!-- Composer -->
        <div class="p-4 bg-white/5 border-t border-white/10 backdrop-blur-md shrink-0">
            <form id="chatForm" class="flex items-center gap-3 w-full max-w-4xl mx-auto" onsubmit="sendMessage(event)">
                <input 
                    type="text" 
                    id="messageInput" 
                    class="flex-1 bg-slate-900/50 border border-slate-700/50 rounded-full px-5 py-3.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all"
                    placeholder="Message..."
                    autocomplete="off"
                >
                <button type="submit" id="sendBtn" class="p-3.5 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 hover:opacity-90 text-white shadow-lg transition-transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:hover:scale-100 flex-shrink-0">
                    <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Modals -->
    <!-- Info Modal -->
    <div id="infoModal" class="fixed inset-0 bg-darker/80 backdrop-blur-sm flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="glass-card rounded-2xl p-6 m-4 max-w-sm w-full border border-white/10 shadow-2xl transform scale-95 transition-transform duration-300" id="infoModalContent">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">Room Info</h3>
                <button onclick="closeInfoModal()" class="text-gray-400 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <div class="space-y-4">
                <div class="flex justify-between py-2 border-b border-white/5">
                    <span class="text-gray-400">Code</span>
                    <div class="flex items-center gap-2">
                        <span id="infoRoomCode" class="font-mono text-white tracking-widest"></span>
                        <button onclick="copyRoomCode()" class="text-blue-400 hover:text-blue-300"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                    </div>
                </div>
                <div class="flex justify-between py-2 border-b border-white/5">
                    <span class="text-gray-400">Time Left</span>
                    <span id="timeRemaining" class="text-white font-medium">Loading...</span>
                </div>
                <div class="flex justify-between py-2 border-b border-white/5">
                    <span class="text-gray-400">Messages</span>
                    <span id="messageCount" class="text-white">0</span>
                </div>
                
                <div class="pt-4">
                    <h4 class="text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">Online Members</h4>
                    <div id="membersList" class="max-h-40 overflow-y-auto space-y-2 pr-2">
                        <!-- Members injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Name Modal -->
    <div id="nameModal" class="fixed inset-0 bg-darker/80 backdrop-blur-sm flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="glass-card rounded-2xl p-6 m-4 max-w-sm w-full border border-white/10 shadow-2xl transform scale-95 transition-transform duration-300" id="nameModalContent">
            <h3 class="text-xl font-bold text-white mb-4">Edit Chat Name</h3>
            <input type="text" id="newChatNameInput" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-white mb-6 focus:border-purple-500 focus:outline-none">
            <div class="flex justify-end gap-3">
                <button onclick="closeNameModal()" class="px-4 py-2 rounded-xl text-gray-400 hover:text-white transition-colors">Cancel</button>
                <button onclick="saveChatName()" class="px-4 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 text-white font-medium hover:opacity-90">Save</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-full shadow-lg text-sm font-medium transition-all duration-300 transform -translate-y-full opacity-0 z-[60]"></div>

    <script>
        const backend = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? "http://localhost:8000" : "/api";
        const roomCode = new URLSearchParams(window.location.search).get('room');
        let userName = localStorage.getItem('userName');

        if (!roomCode || !userName) {
            window.location.href = 'index.html';
        }

        document.getElementById('roomDisplay').textContent = roomCode;
        document.getElementById('infoRoomCode').textContent = roomCode;

        let onlineUsers = new Set([userName]);
        let typingUsers = new Set();
        let messageCheckInterval;
        let savedChatName = 'New Chat';

        // Escaping HTML
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Modals
        function toggleModal(modalId, contentId, show) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(contentId);
            if (show) {
                modal.classList.remove('hidden');
                void modal.offsetWidth;
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            } else {
                modal.classList.add('opacity-0');
                content.classList.add('scale-95');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        function openInfoModal() { updateRoomInfo(); toggleModal('infoModal', 'infoModalContent', true); }
        function closeInfoModal() { toggleModal('infoModal', 'infoModalContent', false); }
        function openNameModal() { document.getElementById('newChatNameInput').value = savedChatName; toggleModal('nameModal', 'nameModalContent', true); document.getElementById('newChatNameInput').focus(); }
        function closeNameModal() { toggleModal('nameModal', 'nameModalContent', false); }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('-translate-y-full', 'opacity-0');
            setTimeout(() => toast.classList.add('-translate-y-full', 'opacity-0'), 2500);
        }

        function copyRoomCode() {
            navigator.clipboard.writeText(roomCode).then(() => showToast('Copied to clipboard!'));
        }

        // API Calls
        async function loadChatName() {
            try {
                const res = await fetch(`${backend}/room/${roomCode}/name`);
                const data = await res.json();
                savedChatName = data.chat_name || 'New Chat';
                document.getElementById('chatName').childNodes[0].nodeValue = savedChatName + " ";
            } catch (e) {}
        }
        loadChatName();

        async function saveChatName() {
            const newName = document.getElementById('newChatNameInput').value.trim();
            if (!newName || newName === savedChatName) return closeNameModal();
            try {
                const res = await fetch(`${backend}/room/${roomCode}/name?user=${encodeURIComponent(userName)}&chat_name=${encodeURIComponent(newName)}`, { method: 'POST' });
                if (res.ok) {
                    savedChatName = newName;
                    document.getElementById('chatName').childNodes[0].nodeValue = newName + " ";
                    closeNameModal();
                    showToast('Chat name updated!');
                    fetchMessages();
                }
            } catch (e) { alert('Error changing chat name'); }
        }

        async function updateRoomInfo() {
            try {
                const res = await fetch(`${backend}/room/${roomCode}/info`);
                const data = await res.json();
                if (data.time_remaining !== undefined) document.getElementById('timeRemaining').textContent = `${data.time_remaining} min`;
                document.getElementById('userCount').textContent = data.user_count || 1;
                document.getElementById('messageCount').textContent = data.message_count || 0;
                
                const list = document.getElementById('membersList');
                list.innerHTML = '';
                (data.active_users || [userName]).forEach(u => {
                    list.innerHTML += `<div class="flex items-center gap-2 text-sm bg-slate-800/50 p-2 rounded-lg border border-slate-700/50">
                        <div class="w-2 h-2 rounded-full ${typingUsers.has(u) ? 'bg-purple-500 animate-pulse' : 'bg-green-500'}"></div>
                        <span class="text-gray-200">${escapeHtml(u)}</span>
                        ${typingUsers.has(u) ? '<span class="text-xs text-purple-400 ml-auto italic">typing...</span>' : ''}
                    </div>`;
                });
            } catch (e) {}
        }

        // Typing
        document.getElementById('messageInput').addEventListener('input', () => {
            fetch(`${backend}/typing/${roomCode}?user=${encodeURIComponent(userName)}`, { method: 'POST' }).catch(() => {});
        });

        setInterval(async () => {
            try {
                const res = await fetch(`${backend}/typing/${roomCode}`);
                const data = await res.json();
                typingUsers = new Set(data.typing || []);
                const indicator = document.getElementById('typingIndicator');
                const others = Array.from(typingUsers).filter(u => u !== userName);
                if (others.length > 0) {
                    indicator.innerHTML = `${escapeHtml(others.join(', '))} ${others.length === 1 ? 'is' : 'are'} typing <span class="loading-dots ml-1"><div></div><div></div><div></div></span>`;
                    indicator.classList.remove('hidden');
                } else {
                    indicator.classList.add('hidden');
                }
            } catch (e) {}
        }, 1500);

        // Messaging
        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            const msg = input.value.trim();
            if (!msg) return;
            
            input.disabled = true;
            btn.disabled = true;
            try {
                await fetch(`${backend}/message/${roomCode}?message=${encodeURIComponent(msg)}&user=${encodeURIComponent(userName)}`, { method: 'POST' });
                input.value = '';
                fetchMessages();
            } catch (err) {}
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        }

        let lastMessageCount = 0;
        async function fetchMessages() {
            try {
                const res = await fetch(`${backend}/messages/${roomCode}`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.messages && data.messages.length !== lastMessageCount) {
                    lastMessageCount = data.messages.length;
                    renderMessages(data.messages);
                }
            } catch (e) {}
        }

        function renderMessages(msgs) {
            const container = document.getElementById('messagesContainer');
            const wasScrolledToBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
            
            container.innerHTML = '';
            msgs.forEach(m => {
                const time = new Date(m.time * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                if (m.user === 'System') {
                    container.innerHTML += `<div class="flex justify-center w-full"><div class="bubble-system">${m.text}</div></div>`;
                } else if (m.user === userName) {
                    container.innerHTML += `<div class="flex justify-end w-full pl-12"><div class="chat-bubble bubble-you">
                        <div>${escapeHtml(m.text)}</div><div class="msg-time text-blue-200">${time}</div>
                    </div></div>`;
                } else {
                    container.innerHTML += `<div class="flex flex-col items-start w-full pr-12">
                        <span class="text-xs text-gray-400 ml-2 mb-1">${escapeHtml(m.user)}</span>
                        <div class="chat-bubble bubble-other">
                            <div>${escapeHtml(m.text)}</div><div class="msg-time text-gray-500">${time}</div>
                        </div>
                    </div>`;
                }
            });
            
            if (wasScrolledToBottom || msgs[msgs.length-1]?.user === userName) {
                container.scrollTop = container.scrollHeight;
            }
        }

        setInterval(fetchMessages, 2000);
        fetchMessages(); // Initial fetch
        
        // Initial join call
        fetch(`${backend}/join/${roomCode}?user=${encodeURIComponent(userName)}`, { method: 'POST' }).catch(()=>{});
        
        // Handle window close
        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon(`${backend}/leave/${roomCode}?user=${encodeURIComponent(userName)}`);
        });
    </script>
</body>
</html>
